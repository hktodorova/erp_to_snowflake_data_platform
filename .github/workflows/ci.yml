name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  validate:
    name: Static and local validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test repository package
        run: python tests/smoke_test_project.py

      - name: Run Python and static project tests
        run: pytest -q

      - name: Validate dbt project can parse without Snowflake credentials
        run: |
          cd dbt
          dbt deps
          dbt parse --profiles-dir .

      - name: SQLFluff lint SQL and dbt models
        run: |
          sqlfluff lint sql --dialect snowflake
          sqlfluff lint dbt/models --dialect snowflake

  security:
    name: Secret scan with Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  dbt-snowflake:
    name: dbt build on Snowflake
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, security, terraform]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt dependencies
        run: pip install -r requirements.txt

      - name: Check Snowflake secrets are configured
        run: |
          missing=0
          for secret in \
            SNOWFLAKE_ACCOUNT \
            SNOWFLAKE_USER \
            SNOWFLAKE_PASSWORD \
            SNOWFLAKE_ROLE \
            SNOWFLAKE_DATABASE \
            SNOWFLAKE_WAREHOUSE \
            SNOWFLAKE_SCHEMA; do
            if [ -z "${!secret}" ]; then
              echo "Missing required GitHub secret: ${secret}"
              missing=1
            fi
          done
          exit "$missing"

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt build against Snowflake
        working-directory: dbt
        run: dbt build --profiles-dir . --target ci
