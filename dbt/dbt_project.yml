name: enterprise_snowflake_platform
version: '1.0.0'
config-version: 2
profile: enterprise_snowflake_platform

model-paths: ['models']
seed-paths: ['seeds']
test-paths: ['tests']
macro-paths: ['macros']
snapshot-paths: ['snapshots']

target-path: 'target'
clean-targets: ['target', 'dbt_packages']

models:
  enterprise_snowflake_platform:
    +persist_docs:
      relation: true
      columns: true
    +copy_grants: true
    +query_tag: "enterprise_snowflake_platform:{{ target.name }}:{{ invocation_id }}"
    staging:
      +schema: STAGING
      +materialized: view
    vault:
      +schema: RAW_VAULT
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: append_new_columns
    marts:
      +schema: MARTS
      +materialized: table
    features:
      +schema: FEATURES
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: append_new_columns

snapshots:
  enterprise_snowflake_platform:
    +target_schema: SNAPSHOTS
