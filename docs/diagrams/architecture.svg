<svg width="1200" height="720" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title{font:700 28px Arial;fill:#111827}.sub{font:14px Arial;fill:#4b5563}.box{stroke-width:2}.h{font:700 17px Arial;fill:#111827}.t{font:13px Arial;fill:#374151}.arrow{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
  <text x="40" y="45" class="title">Enterprise ERP-to-Snowflake Data Platform</text>
  <text x="40" y="70" class="sub">ERP, CRM and payments data integrated into governed Data Vault and dimensional marts</text>
  <rect x="40" y="155" width="180" height="85" rx="14" ry="14" fill="#FFE4CC" stroke="#E67E22" class="box"/><text x="60" y="185" class="h">ERP / CRM</text><text x="60" y="210" class="t">orders, customers, products</text>
  <rect x="40" y="275" width="180" height="85" rx="14" ry="14" fill="#FFE4CC" stroke="#E67E22" class="box"/><text x="60" y="305" class="h">Payments</text><text x="60" y="330" class="t">settlements, refunds</text>
  <rect x="290" y="180" width="210" height="110" rx="14" ry="14" fill="#E0F2FE" stroke="#0284C7" class="box"/><text x="315" y="215" class="h">Ingestion Layer</text><text x="315" y="242" class="t">Snowpipe, COPY INTO</text><text x="315" y="265" class="t">Snowpipe Streaming</text>
  <rect x="570" y="115" width="220" height="90" rx="14" ry="14" fill="#DBEAFE" stroke="#2563EB" class="box"/><text x="595" y="150" class="h">Raw / Bronze</text><text x="595" y="175" class="t">immutable payloads + metadata</text>
  <rect x="570" y="250" width="220" height="90" rx="14" ry="14" fill="#DBEAFE" stroke="#2563EB" class="box"/><text x="595" y="285" class="h">Data Vault</text><text x="595" y="310" class="t">hubs, links, satellites</text>
  <rect x="570" y="385" width="220" height="90" rx="14" ry="14" fill="#DBEAFE" stroke="#2563EB" class="box"/><text x="595" y="420" class="h">Dimensional Marts</text><text x="595" y="445" class="t">facts, dimensions, KPIs</text>
  <rect x="860" y="135" width="230" height="85" rx="14" ry="14" fill="#DCFCE7" stroke="#16A34A" class="box"/><text x="885" y="168" class="h">dbt + SQL ELT</text><text x="885" y="192" class="t">incremental models + tests</text>
  <rect x="860" y="260" width="230" height="85" rx="14" ry="14" fill="#DCFCE7" stroke="#16A34A" class="box"/><text x="885" y="293" class="h">Snowpark Python</text><text x="885" y="317" class="t">DQ + feature jobs</text>
  <rect x="860" y="385" width="230" height="85" rx="14" ry="14" fill="#DCFCE7" stroke="#16A34A" class="box"/><text x="885" y="418" class="h">BI / ML Serving</text><text x="885" y="442" class="t">dashboards, features, sharing</text>
  <rect x="250" y="560" width="760" height="95" rx="14" ry="14" fill="#F3E8FF" stroke="#7E22CE" class="box"/><text x="280" y="595" class="h">Governance, Operations and Automation</text><text x="280" y="610" class="t">RBAC · masking · row access policies · Terraform · Airflow</text><text x="280" y="632" class="t">GitHub Actions · monitoring views · cost controls · alerting</text>
  <line x1="220" y1="197" x2="290" y2="220" class="arrow"/><line x1="220" y1="317" x2="290" y2="255" class="arrow"/>
  <line x1="500" y1="235" x2="570" y2="160" class="arrow"/><line x1="680" y1="205" x2="680" y2="250" class="arrow"/><line x1="680" y1="340" x2="680" y2="385" class="arrow"/>
  <line x1="790" y1="160" x2="860" y2="178" class="arrow"/><line x1="790" y1="295" x2="860" y2="302" class="arrow"/><line x1="790" y1="430" x2="860" y2="428" class="arrow"/>
</svg>
